<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบแจ้งซ่อม | Maintenance Reporting System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
</head>
<body>
  <div id="app">
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f3f4f6">
      <div style="text-align:center">
        <div style="font-size:3rem;margin-bottom:1rem">🔧</div>
        <div class="loading" style="justify-content:center">
          <div class="spinner"></div>
          <span>กำลังเริ่มต้นระบบ...</span>
        </div>
      </div>
    </div>
  </div>
  <div id="toast-container"></div>

  <script src="/js/app.js"></script>
  <script src="/js/pages1.js"></script>
  <script src="/js/pages2.js"></script>
  <script>
    // Bootstrap app
    window.addEventListener('DOMContentLoaded', () => {
      const token = getToken();
      const user = loadUser();
      if (token && user) {
        currentUser = user;
        showApp();
      } else {
        showAuthPage();
      }
    });
  </script>
</body>
</html>
